# fly.toml app configuration file generated for u-short on 2026-03-05T00:39:47+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'u-short'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = "u_short_data"
  destination = "/data"

[env]
  BASE_URL = "https://u-short.fly.dev/"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

