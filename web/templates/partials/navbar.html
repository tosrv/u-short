{{define "navbar"}}
<header class="fixed top-0 w-full p-4 z-50">
  <nav
    class="backdrop-blur-md bg-green-100/10 shadow-sm container mx-auto py-4 px-4 md:px-10 border border-green-300/30 rounded-2xl flex flex-col md:flex-row justify-between md:items-center"
  >
    <div class="flex justify-between w-full md:w-auto items-center">
      <h1 class="font-bold text-xl text-green-500">
        <a
          href="javascript:void(0)"
          onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
          ><i class="fa-solid fa-link-slash"></i> U-Short
        </a>
      </h1>
      <div class="md:hidden">
        <button
          class="text-gray-800 text-xl focus:outline-none"
          _="on click toggle .hidden on #mobileMenu 
          toggle .fa-bars on #burgerBtn 
          toggle .fa-xmark on #burgerBtn"
        >
          <i class="fa-solid fa-bars" id="burgerBtn"></i>
        </button>
      </div>
    </div>

    <div
      id="mobileMenu"
      class="hidden flex flex-col gap-4 mt-4 md:flex md:flex-row md:gap-8 md:mt-0 md:items-center font-bold text-green-500"
    >
      <a
        href="#features"
        class="hover:text-green-600"
        _="on click add .hidden to #mobileMenu 
        remove .fa-xmark from #burgerBtn
        add .fa-bars to #burgerBtn"
        >Features</a
      >
      <a
        href="#works"
        class="hover:text-green-600"
        _="on click add .hidden to #mobileMenu 
        remove .fa-xmark from #burgerBtn
        add .fa-bars to #burgerBtn"
        >How It Works</a
      >
      <a
        href="#faq"
        class="hover:text-green-600"
        _="on click add .hidden to #mobileMenu 
        remove .fa-xmark from #burgerBtn
        add .fa-bars to #burgerBtn"
        >FAQ</a
      >
      <button
        _="on click add .hidden to #mobileMenu 
        then send openDrawer to #historyDrawer 
        then trigger renderHistory on #historyList
        remove .fa-xmark from #burgerBtn
        add .fa-bars to #burgerBtn"
        class="hover:text-green-600 cursor-pointer text-left"
      >
        History
      </button>
    </div>
  </nav>

  {{template "side-drawer" .}}
</header>
{{end}}
