{{template "layout" .}} {{define "content"}}

<div class="w-full">
  <div
    class="relative h-full md:h-screen bg-gray-800 w-screen flex items-center p-6 overflow-hidden"
  >

    <i
      class="fa-solid fa-link absolute text-white opacity-5 text-8xl top-16 left-20 rotate-12"
    ></i>

    <i
      class="fa-solid fa-arrow-right absolute text-white opacity-5 text-7xl top-50 left-1/3 -rotate-12"
    ></i>

    <i
      class="fa-solid fa-globe absolute text-white opacity-5 text-5xl top-20 right-24 rotate-6"
    ></i>

    <i
      class="fa-solid fa-share-nodes absolute text-white opacity-5 text-7xl top-1/2 left-50 rotate-12"
    ></i>

    <i
      class="fa-solid fa-arrow-up-right-from-square absolute text-white opacity-5 text-5xl top-[45%] right-1/4"
    ></i>

    <i
      class="fa-solid fa-link absolute text-white opacity-5 text-4xl top-[50%] right-50 rotate-12"
    ></i>

    <i
      class="fa-solid fa-globe absolute text-white opacity-5 text-6xl bottom-20 left-12 rotate-6"
    ></i>

    <i
      class="fa-solid fa-qrcode absolute text-white opacity-5 text-8xl bottom-16 right-20 -rotate-12"
    ></i>

    <!-- HERO CONTENT -->
    <div class="relative z-10 w-full">{{template "hero" .}}</div>
  </div>

  <div class="flex flex-col">
    {{template "history" .}} {{template "features" .}} {{template "works" .}}
    {{template "use-case" .}} {{template "faq" .}}
  </div>
</div>

{{end}}
